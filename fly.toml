# fly.toml - Konfigurasi Fly.io untuk Laravel App
app = "laravel-app"  # GANTI dengan nama app Anda

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "error"
  DB_CONNECTION = "pgsql"
  SESSION_DRIVER = "database"
  QUEUE_CONNECTION = "database"
  CACHE_STORE = "database"
  FILESYSTEM_DISK = "local"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/up"
    protocol = "http"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "laravel_storage"
  destination = "/app/storage/app/public"

# Uncomment jika ingin deploy ke region tertentu
# [primary_region]
#   region = "sin"  # Singapore

[[statics]]
  guest_path = "/app/public/build"
  url_prefix = "/build"